<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Inky Vibes - Combined Embed</title>

    <style>
      :root {
        /* Video area size (won't grow when Google Sites embed is taller) */
        --video-min-height: 320px;
        --video-max-height: 520px;

        /* Second page height (increase if you want more content visible) */
        --page2-height: 2000px;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: #000;
      }

      iframe {
        width: 100%;
        border: 0;
        display: block;
        background: #000;
      }

      /* Video section: responsive but capped */
      .video-wrap {
        width: 100%;
        height: clamp(var(--video-min-height), 45svh, var(--video-max-height));
      }

      .video-wrap iframe {
        height: 100%;
      }

      /* Second section: MUST have explicit height to avoid black area on iPhone */
      .page2-wrap {
        width: 100%;
        height: var(--page2-height);
      }

      .page2-wrap iframe {
        height: 100%;
      }

      /* Optional: a little separation */
      .divider {
        height: 16px;
        background: #000;
      }

      /* On very small screens, slightly reduce video max height */
      @media (max-width: 420px) {
        :root {
          --video-max-height: 480px;
        }
      }
    </style>
  </head>

  <body>
    <!-- 1) Video -->
    <section class="video-wrap">
      <iframe
        src="https://johnsimsek.github.io/Websitecover-video/"
        title="Website cover video"
        loading="eager"
        allow="autoplay; fullscreen; picture-in-picture"
        referrerpolicy="no-referrer"
      ></iframe>
    </section>

    <div class="divider"></div>

    <!-- 2) Main site -->
    <section class="page2-wrap">
      <iframe
        src="https://johnsimsek.github.io/All-web/"
        title="All web"
        loading="lazy"
        referrerpolicy="no-referrer"
      ></iframe>
    </section>
  </body>
</html>
