<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Combined Embed</title>

    <style>
      :root {
        --video-min-height: 320px;
        --video-max-height: 520px;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent; /* important: don't show black */
      }

      iframe {
        width: 100%;
        border: 0;
        display: block;
        background: transparent;
      }

      .video-wrap {
        width: 100%;
        height: clamp(var(--video-min-height), 45svh, var(--video-max-height));
        background: #000;
      }
      .video-wrap iframe {
        height: 100%;
        background: #000;
      }

      .page2-wrap {
        width: 100%;
        background: transparent;
      }

      /* Start with something reasonable until we receive the real height */
      #page2Frame {
        height: 1200px;
      }
    </style>
  </head>

  <body>
    <!-- 1) Video -->
    <section class="video-wrap">
      <iframe
        id="videoFrame"
        src="https://johnsimsek.github.io/Websitecover-video/"
        title="Website cover video"
        loading="eager"
        allow="autoplay; fullscreen; picture-in-picture"
      ></iframe>
    </section>

    <!-- 2) Main site (auto-height) -->
    <section class="page2-wrap">
      <iframe
        id="page2Frame"
        src="https://johnsimsek.github.io/All-web/"
        title="All web"
        loading="lazy"
      ></iframe>
    </section>

    <script>
      /**
       * Auto-resize #page2Frame using postMessage from the embedded page.
       * Requires a small script added into the /All-web/ page (next section).
       */
      const PAGE2_ORIGIN = "https://johnsimsek.github.io";
      const page2Frame = document.getElementById("page2Frame");

      function setPage2Height(px) {
        const safe = Math.max(300, Math.min(Number(px) || 0, 20000));
        page2Frame.style.height = `${safe}px`;
      }

      window.addEventListener("message", (event) => {
        if (event.origin !== PAGE2_ORIGIN) return;
        if (!event.data || event.data.type !== "PAGE_HEIGHT") return;
        setPage2Height(event.data.height);
      });

      // Fallback: ask again after load (in case first message is missed)
      page2Frame.addEventListener("load", () => {
        page2Frame.contentWindow?.postMessage({ type: "REQUEST_HEIGHT" }, PAGE2_ORIGIN);
      });
    </script>
  </body>
</html>
